# --- PRODUCCION ---
# Este perfil se activa con: --spring.profiles.active=prod
# o con la variable de entorno: SPRING_PROFILES_ACTIVE=prod

spring.application.name=mundial-backend

# --- Datasource (Variables de entorno - NUNCA hardcodear) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HikariCP optimizado para RAM limitada (512MB) ---
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000

# --- JPA / Hibernate (Produccion) ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.generate_statistics=false

# --- GraphQL (Produccion: GraphiQL DESHABILITADO) ---
spring.graphql.graphiql.enabled=false
spring.graphql.path=/graphql

# --- JWT (Variable de entorno obligatoria) ---
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# --- API-Football ---
api-football.api-key=${API_FOOTBALL_KEY:disabled}
api-football.base-url=https://v3.football.api-sports.io
api-football.league-id=1
api-football.season=2026
api-football.cache-ttl-minutes=30

# --- Servidor optimizado para RAM limitada ---
server.port=${PORT:8080}
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=2
server.tomcat.max-connections=200
server.tomcat.accept-count=50
server.compression.enabled=true

# --- Email via Resend API (HTTP, no SMTP) ---
resend.api-key=${RESEND_API_KEY}
app.mail.from=${MAIL_FROM:soporte@dt26.win}
app.frontend-url=${FRONTEND_URL:https://dt26.win}

# Desactivar autoconfig de JavaMailSender (usamos API HTTP)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailAutoConfiguration
server.compression.mime-types=application/json,application/graphql+json,text/html,text/plain
server.compression.min-response-size=1024

# --- CORS (Variable de entorno) ---
app.cors.allowed-origins=${FRONTEND_URL:https://dt26.win}

# --- Sync API Key (protege endpoints de admin /api/sync/**) ---
app.sync.api-key=${SYNC_API_KEY:}

# --- Google Sign-In ---
google.client-id=${GOOGLE_CLIENT_ID:}

# --- Desactivar health check de mail (evita que Railway falle el deploy) ---
management.health.mail.enabled=false

# --- Logging (Produccion: solo WARN+) ---
logging.level.root=WARN
logging.level.com.mundial2026=INFO
logging.level.com.mundial2026.controller.AuthController=INFO
logging.level.com.mundial2026.security.RateLimitFilter=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
